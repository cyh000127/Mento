services:
  fe_dev:
    image: node:20-alpine
    container_name: fe_dev
    working_dir: /app
    restart: unless-stopped

    # 외부 접속 필요하면 EC2 보안그룹에서 5173 오픈 or nginx로 프록시
    ports:
      - "5173:5173"

    environment:
      NODE_ENV: development
      # Docker 환경에서 파일 변경 감지 안정화(필요 없으면 제거 가능)
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"

    # EC2에 내려받아 둔 FE 코드 경로를 마운트
    # - 여기 경로는 "CD/Final이 실제로 FE 코드를 두는 위치"와 반드시 일치해야 함
    volumes:
      - /home/ubuntu/app/frontend/front-repo/frontend/mento:/app
      # node_modules는 볼륨로 분리(호스트/컨테이너 OS 차이로 인한 충돌 방지)
      - fe_dev_node_modules:/app/node_modules

    command: >
      sh -lc "
        node -v &&
        npm -v &&
        if [ -f package-lock.json ]; then
          npm ci;
        else
          npm install;
        fi &&
        npm run dev -- --host 0.0.0.0 --port 5173
      "

volumes:
  fe_dev_node_modules:
