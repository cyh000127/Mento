version: '3.8'

services:
  mysql:
    container_name: mysql
    image: mysql:8.4
    restart: unless-stopped
    networks:
      - app-network
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - /home/ubuntu/app/backend/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=200
      - --slow-query-log=1
      - --slow-query-log-file=/var/lib/mysql/slow.log
      - --long-query-time=0.5
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 2G # 3G에서 약간 조정 (인스턴스 사양에 맞춤)
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${DB_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: redis
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - app-network
    expose:
      - "6379"
    volumes:
      - redis_data:/data
      - ../conf/redis.conf:/usr/local/etc/redis/redis.conf
    env_file:
      - .env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD} --maxmemory 1gb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: backend
    image: ${BE_IMAGE:-ejjem/s14p11a704:backend}
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -Dfile.encoding=UTF-8"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CLOUDFLARE_ENDPOINT: ${CLOUDFLARE_ENDPOINT}
      CLOUDFLARE_BUCKET: ${CLOUDFLARE_BUCKET}
      CLOUDFLARE_ACCESS_KEY: ${CLOUDFLARE_ACCESS_KEY}
      CLOUDFLARE_SECRET_KEY: ${CLOUDFLARE_SECRET_KEY}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: prometheus,health,info
      MANAGEMENT_ENDPOINT_METRICS_ENABLED: "true"
      MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED: "true"
      MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED: "true"
    deploy:
      resources:
        limits:
          cpus: '3.5'
          memory: 8G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app-network
      - live-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  fe_dev:
    image: node:20-alpine
    container_name: fe_dev
    working_dir: /app
    restart: unless-stopped
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 외부 접속 필요하면 EC2 보안그룹에서 5173 오픈 or nginx로 프록시
    expose:
      - "5173"

    environment:
      NODE_ENV: development
      # Docker 환경에서 파일 변경 감지 안정화(필요 없으면 제거 가능)
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"

    volumes:
      - /home/ubuntu/app/frontend/front-repo/frontend/mento:/app
      - fe_dev_node_modules:/app/node_modules

    command: >
      sh -lc "
        node -v &&
        npm -v &&
        if [ -f package-lock.json ]; then
          npm ci;
        else
          npm install;
        fi &&
        npm run dev -- --host 0.0.0.0 --port 5173
      "
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
      - monitoring-network
    volumes:
      # (1) 레포에서 관리되는 nginx 설정(conf.d)
      - /home/ubuntu/app/infra/infra-repo/infra/nginx/conf.d:/etc/nginx/conf.d:ro

      # (2) 운영 데이터: ACME challenge (webroot)
      - /home/ubuntu/app/infra/infra-runtime/certbot/www:/var/www/certbot:ro

      # (3) 운영 데이터: 인증서 저장소
      - /home/ubuntu/app/infra/infra-runtime/certbot/conf:/etc/letsencrypt:ro

  ocr:
    container_name: ocr
    image: ${OCR_IMAGE:-ejjem/s14p11a704:ocr}
    restart: unless-stopped
    expose:
      - "1000"
    env_file:
      - .env
    environment:
      - NAVER_OCR_URL=${NAVER_OCR_URL}
      - NAVER_SECRET_KEY=${NAVER_SECRET_KEY}
      - ES_URL=${ES_URL:-http://elasticsearch:9200}
      - PYTHONUNBUFFERED=1
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1.0'    # 이미지 처리 및 API 통신을 고려하여 1.0 할당
          memory: 2G     # Pillow 등 이미지 처리 라이브러리 메모리 고려
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "timeout 5s bash -c '< /dev/tcp/127.0.0.1/1000' || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    command: >
      bash -c "bin/elasticsearch-plugin install --batch analysis-nori &&
               /usr/local/bin/docker-entrypoint.sh elasticsearch"
    expose:
      - "9200"
    networks:
      - app-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    expose:
      - "5601"
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_BASEPATH="/kibana"
      - SERVER_REWRITEBASEPATH="true"
    depends_on:
      - elasticsearch
    networks:
      - app-network

  aiskin:
    image: ${AISKIN_IMAGE:-ejjem/s14p11a704:aiskin}
    container_name: aiskin
    expose:
      - "4000"
    command: uvicorn main:app --host 0.0.0.0 --port 4000
    networks:
      - app-network


volumes:
  mysql_data:
  redis_data:
  fe_dev_node_modules:
  es_data:
    driver: local

networks:
  app-network:
    external: true
  live-network:
    external: true
  monitoring-network:
    external: true