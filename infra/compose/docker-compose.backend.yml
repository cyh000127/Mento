services:
  be:
    image: ${BE_IMAGE:-ejjem/s14p11a704:develop-be}
    container_name: be
    restart: unless-stopped

    # Nginx가 앞단이면 보통 ports는 제거(외부 노출 방지)
    # 같은 compose 프로젝트 내부에서 nginx가 be:8080 으로 접근 가능
    expose:
      - "8080"

    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75.0 -Dfile.encoding=UTF-8}
      # 나중에 필요하면 여기 추가
      # SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      # SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      # SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      # SPRING_REDIS_HOST: ${SPRING_REDIS_HOST:-redis}
      # SPRING_REDIS_PORT: ${SPRING_REDIS_PORT:-6379}



    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s

    # 로그 사이즈 제한
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
