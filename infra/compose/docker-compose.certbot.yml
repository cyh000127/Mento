services:
  certbot:
    image: certbot/certbot:latest
    container_name: certbot

    # nginx와 "같은 경로"를 봐야 challenge/인증서 공유가 됨
    volumes:
      - /home/ubuntu/app/infra/infra-runtime/certbot/www:/var/www/certbot
      - /home/ubuntu/app/infra/infra-runtime/certbot/conf:/etc/letsencrypt

    entrypoint: /bin/sh -c
    command: >
      "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h;
      done"

    restart: unless-stopped
