version: '3.8'

services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "8888:3000"
    environment:
      - GF_SERVER_ROOT_URL=http://i14a704.p.ssafy.io:8888
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring-network


volumes:
  grafana-data:

networks:
  monitoring-network:
    external: true