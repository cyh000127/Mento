services:
  redis_livekit:
    container_name: redis_livekit
    image: redis:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    restart: unless-stopped
    network_mode: "host"
    command: ["--config", "/etc/livekit/config.yml"]
    volumes:
      - ../livekit/config.yml:/etc/livekit/config.yml:ro
    depends_on:
      - redis_livekit

  livekit-agent:
    image: ejjem/s14p11a704:livekit-agent
    container_name: livekit-agent
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONUNBUFFERED=1
      - LIVEKIT_URL=http://host.docker.internal:8000
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_REDIS_URL=redis://redis_livekit:6379
    command: ["dev"]
    depends_on:
      - livekit
      - redis_livekit