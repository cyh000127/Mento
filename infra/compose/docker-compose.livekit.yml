services:
  redis_livekit:
    container_name: redis_livekit
    image: redis:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    restart: unless-stopped
    network_mode: "host"
    command: ["--config", "/etc/livekit/config.yml"]
    volumes:
      - ../livekit/config.yml:/etc/livekit/config.yml:ro
    depends_on:
      - redis_livekit