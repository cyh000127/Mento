server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: mysql-slow-query
    static_configs:
      - targets:
          - localhost
        labels:
          job: mysql-slow
          host: mysql
          __path__: /var/lib/mysql/slow.log # 볼륨 마운트된 경로
    pipeline_stages:
      - multiline:
          # MySQL 슬로우 쿼리는 # Time: 으로 시작하는 여러 줄 로그입니다.
          firstline: '^# Time:'
          max_wait_time: 3s