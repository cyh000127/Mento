server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: mysql-slow-query
    static_configs:
      - targets:
          - localhost
        labels:
          job: mysql-slow
          host: mysql
          __path__: /var/lib/mysql/slow.log
    pipeline_stages:
      - multiline:
          firstline: '^# Time:'
          max_wait_time: 3s

  - job_name: backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: backend
          __path__: /var/log/backend/mento*.json
    pipeline_stages:
      - json:
          expressions:
            timestamp: "@timestamp"
            level: "log.level"
            logger: "log.logger"
            service: "service.name"
            environment: environment
            message: message
            trace_id: "trace.id"
            user_id: "user.id"
            http_method: "http.request.method"
            url_path: "url.path"
            duration: duration_ms
            git_commit: "git.commit_short"
      - labels:
          level:
          service:
          environment:
          logger:
      - timestamp:
          source: timestamp
          format: RFC3339