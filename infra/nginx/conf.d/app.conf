
# =========================
# Forwarded headers fallback
# =========================
map $http_x_forwarded_proto $proxy_xfp {
    default $http_x_forwarded_proto;
    ""      $scheme;
}
map $http_x_forwarded_host $proxy_xfh {
    default $http_x_forwarded_host;
    ""      $http_host;
}
map $http_x_forwarded_port $proxy_xfpport {
    default $http_x_forwarded_port;
    ""      $server_port;
}

# WebSocket 헤더용
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# =========================
# Upstreams (서버 그룹 정의)
# =========================
upstream backend_up {
   server backend:8080;
   keepalive 32;
}

upstream livekit_up {
    server host.docker.internal:8000;
    keepalive 32;
}

upstream fe_dev_up {
    server fe_dev:5173;
    keepalive 32;
}

upstream grafana_up {
    server grafana:3000;
    keepalive 32;
}

upstream prometheus_up {
    server prometheus:9090;
    keepalive 32;
}

upstream cadvisor_up {
    server cadvisor:8080;
    keepalive 32;
}


# http 서버 블록
server {
  listen 80;
  server_name i14a704.p.ssafy.io;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}



# https 서버 블록
server {
  listen 443 ssl;
  http2 on;
  server_name i14a704.p.ssafy.io;

  ssl_certificate     /etc/letsencrypt/live/i14a704.p.ssafy.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/i14a704.p.ssafy.io/privkey.pem;

  # TLS 최적화 (공통 적용)
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;
  ssl_protocols TLSv1.2 TLSv1.3;

    # LiveKit Signaling (WebRTC 연결의 관문)
    location /rtc/ {
        # LiveKit 서버는 보통 루트(/)에서 WebSocket을 대기하므로, /rtc를 제거하고 전달해야 합니다.
        proxy_pass http://livekit_up/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_connect_timeout 86400;
    }

    # LiveKit API (Twirp 통신용)
    location /twirp/ {
        proxy_pass http://livekit_up;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    #백엔드 API (v1)
    location /api/v1 {
        proxy_pass http://backend_up;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

    }

    # 소셜 로그인 관련 경로
    location /login/oauth2/code/kakao {
        proxy_pass http://backend_up;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
  }


  location ^~ /grafana/ {
      proxy_pass http://grafana_up;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_redirect off;
  }

  location ^~ /prometheus/ {
      proxy_pass http://prometheus_up;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_redirect off;
  }

  location / {
      proxy_pass http://fe_dev_up;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
  }
}