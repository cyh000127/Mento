
# =========================
# Forwarded headers fallback
# =========================
map $http_x_forwarded_proto $proxy_xfp {
    default $http_x_forwarded_proto;
    ""      $scheme;
}
map $http_x_forwarded_host $proxy_xfh {
    default $http_x_forwarded_host;
    ""      $http_host;
}
map $http_x_forwarded_port $proxy_xfpport {
    default $http_x_forwarded_port;
    ""      $server_port;
}

# WebSocket 헤더용
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $http_origin $cors_origin {
    default "";
    "https://i14a704.p.ssafy.io" $http_origin;
    "http://localhost:5173" $http_origin;
}

# =========================
# Upstreams (서버 그룹 정의)
# =========================
upstream backend_up {
   server backend:8080;
   keepalive 32;
}

upstream livekit_up {
    server host.docker.internal:8000;
    keepalive 32;
}

upstream frontend_up {
    server frontend:5173;
    keepalive 32;
}

upstream grafana_up {
    server grafana:3000;
    keepalive 32;
}

upstream prometheus_up {
    server prometheus:9090;
    keepalive 32;
}

upstream cadvisor_up {
    server cadvisor:8080;
    keepalive 32;
}

upstream ocr_up {
   server ocr:1000;
   keepalive 32;
}

upstream kibana_up {
   server kibana:5601;
   keepalive 32;
}

# upsteam aiskin_up{
#    server aiskin:4000;
#    keepalive 32;
# }


# http 서버 블록
server {
  listen 80;
  server_name i14a704.p.ssafy.io;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}



# https 서버 블록
server {
  listen 443 ssl;
  http2 on;
  server_name i14a704.p.ssafy.io;

  ssl_certificate     /etc/letsencrypt/live/i14a704.p.ssafy.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/i14a704.p.ssafy.io/privkey.pem;

  # TLS 최적화 (공통 적용)
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;
  ssl_protocols TLSv1.2 TLSv1.3;

    # Swagger UI 및 API Docs 설정

    location ~ ^/(swagger-ui|v3/api-docs)  {
        proxy_pass http://backend_up;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

                # Swagger 리소스 로딩을 위한 설정
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
    }

    location ^~ /kibana/ {
          proxy_pass http://kibana_up;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_redirect off;
    }

    # LiveKit Signaling (WebRTC 연결의 관문)
    location /rtc/ {
        # LiveKit 서버는 보통 루트(/)에서 WebSocket을 대기하므로, /rtc를 제거하고 전달해야 합니다.
        proxy_pass http://livekit_up/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_connect_timeout 86400;
    }

    # LiveKit API (Twirp 통신용)
    location /twirp/ {
        proxy_pass http://livekit_up;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # OCR 서비스 엔드포인트
    location /api/ocr/ {
            client_max_body_size 10M;

            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Credentials';

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204; # 여기서 끝내도 위 'always' 헤더들은 포함되어 나갑니다.
            }

            proxy_pass http://ocr_up;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 타임아웃 설정 (OCR 처리가 길어질 수 있으므로)
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
    }

    location /api/v1/notifications/subscribe {
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection "keep-alive";

        # 3. CORS 설정
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # 4. 백엔드 전송 설정 (중복 제거)
        proxy_pass http://backend_up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    #백엔드 API (v1)
    location /api/v1 {
        client_max_body_size 30M;

        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://backend_up;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /test/v1 {
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Credentials';

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            proxy_pass http://backend_up;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

    # OAuth2 콜백 경로는 프론트엔드로 전달
    location = /login/oauth2/callback {
        proxy_pass http://frontend_up;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 만약 프론트엔드에서 웹소켓이나 HMR을 사용한다면 아래 설정도 유지
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 소셜 로그인 관련 경로
    location ~ ^/(login|oauth2)/ {
        proxy_pass http://backend_up;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
  }



  location ^~ /grafana/ {
      proxy_pass http://grafana_up;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_redirect off;
  }

  location ^~ /prometheus/ {
      proxy_pass http://prometheus_up;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_redirect off;
  }

  location / {
      proxy_pass http://frontend_up;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
  }
}