# http 서버 블록
server {
  listen 80;
  server_name i14a704.p.ssafy.io;

  # Let's Encrypt 인증용 경로
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # 그 외엔 전부 https redirect
  location / {
    return 301 https://$host$request_uri;
  }
}

# https 서버 블록
server {
  listen 443 ssl http2;
  server_name i14a704.p.ssafy.io;

  # 인증서 관련
  ssl_certificate     /etc/letsencrypt/live/i14a704.p.ssafy.io/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/i14a704.p.ssafy.io/privkey.pem;

  # TLS 세션 재사용(세션 캐시) 유효기간 -> 1일
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  # 허용 TLS 버전
  ssl_protocols TLSv1.2 TLSv1.3;

  location / {
          # fe_dev 컨테이너의 5173 포트로 연결
          proxy_pass http://fe_dev:5173;

          # Vite HMR(WebSocket)을 위한 설정
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";

          # 헤더 전달 설정
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
      }

}
