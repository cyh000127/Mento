# HTTPS 서버 블록 (모니터링 전용)
server {
    listen 443 ssl http2;
    server_name i14a704.p.ssafy.io;

    # 기존 app.conf와 동일한 인증서 사용
    ssl_certificate     /etc/letsencrypt/live/i14a704.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/i14a704.p.ssafy.io/privkey.pem;

    # TLS 최적화 설정 (기존 설정 유지)
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;

    # 1. Grafana 경로 설정
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Grafana 내부에서 리디렉션 시 깨짐 방지
        proxy_redirect off;
    }

    # 2. Prometheus 경로 설정
    location /prometheus/ {
        proxy_pass http://prometheus:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}