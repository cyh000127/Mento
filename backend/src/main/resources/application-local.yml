  spring:
    datasource:
      url: jdbc:h2:~/mready;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;MODE=MySQL;AUTO_SERVER=TRUE
      driver-class-name: org.h2.Driver
      username: h2
      password: h2
    data:
      redis:
        host: localhost
        port: 6379
        password: ${REDIS_PASSWORD}


    security:
      oauth2:
        client:
          registration:
            kakao:
              client-id: ${KAKAO_CLIENT_ID}
              client-secret: ${KAKAO_CLIENT_SECRET}
              client-authentication-method: client_secret_post
              authorization-grant-type: authorization_code
              redirect-uri: ${KAKAO_REDIRECT_URI}
              scope: profile_nickname, account_email
              client-name: Kakao
          provider:
            kakao:
              authorization-uri: https://kauth.kakao.com/oauth/authorize
              token-uri: https://kauth.kakao.com/oauth/token
              user-info-uri: https://kapi.kakao.com/v2/user/me
              user-name-attribute: id

    jpa:
      hibernate:
        ddl-auto: create-drop
      properties:
        hibernate:
          dialect: org.hibernate.dialect.H2Dialect
          show_sql: true
          format_sql: true
          use_sql_comments: true
          criteria:
            literal_handling_mode: bind
          query:
            in_clause_parameter_padding: true
          connection:
            provider_disables_autocommit: true
          jdbc:
            time_zone: UTC

  jwt:
    secret: ${JWT_SECRET:LocalDevSecretKeyWhichIsVeryLongAndSecureEnoughForHS256Algorithm}
    access-token-expiration: 1800000 # 30M
    refresh-token-expiration: 1209600000 # 14D

  livekit:
    url: ${LIVEKIT_URL}
    api-key: ${LIVEKIT_API_KEY}
    secret: ${LIVEKIT_API_SECRET}