spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?rewriteBatchedStatements=true&zeroDateTimeBehavior=convertToNull&useUnicode=true&characterEncoding=utf8&useSSL=false&requireSSL=false&connectTimeout=10000&socketTimeout=60000&serverTimezone=UTC&sessionVariables=character_set_results=utf8mb4
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: redis
      port: 6379

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        show_sql: false
        format_sql: false
        use_sql_comments: false
        criteria:
          literal_handling_mode: bind
        query:
          in_clause_parameter_padding: true
        connection:
          provider_disables_autocommit: true
        jdbc:
          time_zone: UTC